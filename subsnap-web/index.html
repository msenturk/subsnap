<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubSnap - Sync Subtitles Online</title>
    <!-- Tell Trunk to bundle the Rust project -->
    <link data-trunk rel="rust" data-bin="subsnap" data-wasm-opt="0" data-wasm-output="subsnap" />
    <style>
        html {
            /* Remove touch delay: */
            touch-action: manipulation;
        }

        body {
            /* Light mode by default */
            background: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* Allow canvas to fill the page: */
        canvas {
            width: 100%;
            height: 100%;
        }

        .centered {
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- The canvas where egui will render -->
    <canvas id="the_canvas_id"></canvas>

    <script>
        // Use a hook to handle errors:
        window.addEventListener('error', (event) => {
            console.error("Uncaught error:", event.error);
        });
    </script>
</body>
</html>
