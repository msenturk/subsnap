name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: subsnap
            asset_name: subsnap-linux
          - os: windows-latest
            artifact_name: subsnap.exe
            asset_name: subsnap-windows.exe
          - os: macos-latest
            artifact_name: subsnap
            asset_name: subsnap-macos

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Rust Setup
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/subsnap-linux/subsnap artifacts/subsnap-linux
          mv artifacts/subsnap-macos/subsnap artifacts/subsnap-macos
          mv artifacts/subsnap-windows.exe/subsnap.exe artifacts/subsnap.exe
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/subsnap-linux
            artifacts/subsnap-macos
            artifacts/subsnap.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
